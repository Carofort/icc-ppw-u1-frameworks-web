<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 08 - Validación de Formularios</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Registro de Usuario</h1>
            <p>Complete sus datos para continuar:</p>
        </header>

        <form id="registro-form" class="form" novalidate>
            <div class="form-group" data-campo="nombre">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Mínimo 3 caracteres" required>
                <span class="error-msg"></span>
            </div>

            <div class="form-group" data-campo="email">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                <span class="error-msg"></span>
            </div>

            <div class="form-group" data-campo="telefono">
                <label for="telefono">Teléfono (10 dígitos)</label>
                <input type="tel" id="telefono" name="telefono" placeholder="09XXXXXXXX" maxlength="10">
                <span class="error-msg"></span>
            </div>

            <div class="form-group" data-campo="fechaNacimiento">
                <label for="fechaNacimiento">Fecha de Nacimiento</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                <span class="error-msg"></span>
            </div>

            <div class="form-group" data-campo="genero">
                <label for="genero">Género</label>
                <select id="genero" name="genero" required>
                    <option value="">Seleccione una opción</option>
                    <option value="M">Masculino</option>
                    <option value="F">Femenino</option>
                    <option value="O">Otro</option>
                </select>
                <span class="error-msg"></span>
            </div>

            <div class="form-group" data-campo="password">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mín. 8, Mayús, Min, Núm" required>
                <div id="pass-strength" class="strength-meter"></div>
                <span class="error-msg"></span>
            </div>

            <div class="form-group" data-campo="confirmPassword">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
                <span class="error-msg"></span>
            </div>

            <div class="form-group checkbox-group" data-campo="terminos">
                <label>
                    <input type="checkbox" id="terminos" name="terminos" required>
                    Acepto los términos y condiciones
                </label>
                <span class="error-msg"></span>
            </div>

            <div id="mensaje-exito" class="alert oculto">¡Registro completado con éxito!</div>

            <button type="submit" id="btn-submit" class="btn btn--primary" disabled>Registrarse</button>

        </form>
    </div>

    <script src="js/validacion.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
